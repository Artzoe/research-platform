<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 790" width="600" height="790">
  <rect width="600" height="790" fill="#FFFDF7"/>
  <rect x="30" y="20" width="540" height="750" rx="2" fill="none" stroke="#d4c5a0" stroke-width="1"/>
  <text x="300" y="65" text-anchor="middle" font-size="20" fill="#c0392b" font-weight="bold" font-family="serif">XX大学附属医院</text>
  <line x1="50" y1="80" x2="550" y2="80" stroke="#c0392b" stroke-width="1.5"/>
  <text x="300" y="115" text-anchor="middle" font-size="18" fill="#1a1a2e" font-weight="bold">乳腺超声检查报告</text>
  <line x1="50" y1="130" x2="550" y2="130" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="60" y="155" font-size="12" fill="#888">科 室：超声科</text>
  <text x="300" y="155" font-size="12" fill="#888">日 期：2022年7月12日</text>
  <line x1="50" y1="170" x2="550" y2="170" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="60" y="210" font-size="13" fill="#888">姓 名：</text><text x="180" y="210" font-size="14" fill="#333">欧阳*健</text>
<text x="60" y="236" font-size="13" fill="#888">性 别：</text><text x="180" y="236" font-size="14" fill="#333">女</text><text x="340" y="236" font-size="13" fill="#888">年 龄：</text><text x="440" y="236" font-size="14" fill="#333">47岁</text>
<text x="60" y="262" font-size="13" fill="#888">临床诊断：</text><text x="180" y="262" font-size="14" fill="#333">左乳肿物待查</text>
<line x1="50" y1="280" x2="550" y2="280" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="300" font-size="15" fill="#1a1a2e" font-weight="bold">超声所见</text>
<text x="60" y="330" font-size="14" fill="#333">左乳外上象限探及一低回声肿块，大小约2.5×1.8×1.6cm</text>
<text x="60" y="358" font-size="14" fill="#333">形态不规则，边界不清，可见毛刺征，内部回声不均匀，</text>
<text x="60" y="386" font-size="14" fill="#333">后方回声轻度衰减。CDFI：内可见点条状血流信号。</text>
<text x="60" y="414" font-size="14" fill="#333"></text>
<text x="60" y="442" font-size="14" fill="#333">左腋下探及数个淋巴结回声，较大者约1.2×0.8cm，</text>
<text x="60" y="470" font-size="14" fill="#333">皮质增厚，皮髓质分界欠清。</text>
<text x="60" y="498" font-size="14" fill="#333"></text>
<text x="60" y="526" font-size="14" fill="#333">右乳未见明确异常回声。</text>
<line x1="50" y1="546" x2="550" y2="546" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="566" font-size="15" fill="#1a1a2e" font-weight="bold">超声诊断</text>
<text x="60" y="596" font-size="14" fill="#333">1. 左乳外上象限实性肿块 BI-RADS 5类</text>
<text x="60" y="624" font-size="14" fill="#333">   （高度可疑恶性，建议穿刺活检）</text>
<text x="60" y="652" font-size="14" fill="#333">2. 左腋窝淋巴结肿大，考虑转移可能</text>

