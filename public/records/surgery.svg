<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 868" width="600" height="868">
  <rect width="600" height="868" fill="#FFFDF7"/>
  <rect x="30" y="20" width="540" height="828" rx="2" fill="none" stroke="#d4c5a0" stroke-width="1"/>
  <text x="300" y="65" text-anchor="middle" font-size="20" fill="#c0392b" font-weight="bold" font-family="serif">XX大学附属医院</text>
  <line x1="50" y1="80" x2="550" y2="80" stroke="#c0392b" stroke-width="1.5"/>
  <text x="300" y="115" text-anchor="middle" font-size="18" fill="#1a1a2e" font-weight="bold">手术记录</text>
  <line x1="50" y1="130" x2="550" y2="130" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="60" y="155" font-size="12" fill="#888">科 室：乳腺外科</text>
  <text x="300" y="155" font-size="12" fill="#888">日 期：2022年7月11日</text>
  <line x1="50" y1="170" x2="550" y2="170" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="60" y="210" font-size="13" fill="#888">姓 名：</text><text x="180" y="210" font-size="14" fill="#333">欧阳*健</text>
<text x="60" y="236" font-size="13" fill="#888">手术日期：</text><text x="180" y="236" font-size="14" fill="#333">2022年7月11日</text>
<text x="60" y="262" font-size="13" fill="#888">术前诊断：</text><text x="180" y="262" font-size="14" fill="#333">左乳浸润性导管癌 cT2N1M0</text>
<text x="60" y="288" font-size="13" fill="#888">术后诊断：</text><text x="180" y="288" font-size="14" fill="#333">左乳浸润性导管癌 pT1cN1M0</text>
<text x="60" y="314" font-size="13" fill="#888">手术名称：</text><text x="180" y="314" font-size="14" fill="#333">左乳保乳术 + 前哨淋巴结活检</text>
<text x="60" y="340" font-size="13" fill="#888">麻醉方式：</text><text x="180" y="340" font-size="14" fill="#333">全身麻醉</text>
<line x1="50" y1="358" x2="550" y2="358" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="378" font-size="15" fill="#1a1a2e" font-weight="bold">手术经过</text>
<text x="60" y="408" font-size="14" fill="#333">患者取仰卧位，常规消毒铺巾。全麻成功后，</text>
<text x="60" y="436" font-size="14" fill="#333">于左乳肿块表面做弧形切口，逐层切开皮肤、皮下组织，</text>
<text x="60" y="464" font-size="14" fill="#333">以肿块为中心距边缘2cm切除肿块及周围正常组织。</text>
<text x="60" y="492" font-size="14" fill="#333">术中快速冰冻示：切缘阴性。</text>
<text x="60" y="520" font-size="14" fill="#333"></text>
<text x="60" y="548" font-size="14" fill="#333">注射示踪剂后行前哨淋巴结活检，检出前哨淋巴结3枚，</text>
<text x="60" y="576" font-size="14" fill="#333">术中冰冻示1枚阳性，遂行腋窝淋巴结清扫。</text>
<text x="60" y="604" font-size="14" fill="#333">清扫I-II组淋巴结，共检出淋巴结18枚。</text>
<text x="60" y="632" font-size="14" fill="#333"></text>
<text x="60" y="660" font-size="14" fill="#333">彻底止血，留置引流管，逐层缝合切口。</text>
<line x1="50" y1="680" x2="550" y2="680" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="700" font-size="15" fill="#1a1a2e" font-weight="bold">术中出血</text>
<text x="60" y="730" font-size="14" fill="#333">约50ml，未输血。</text>

  <line x1="50" y1="778" x2="550" y2="778" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="380" y="803" font-size="13" fill="#888">报告医师：</text>
  <text x="455" y="803" font-size="14" fill="#333">王晓明</text>
  <text x="380" y="826" font-size="13" fill="#888">审核医师：</text>
  <text x="455" y="826" font-size="14" fill="#333">李建国</text>
</svg>