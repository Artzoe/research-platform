  <line x1="50" y1="80" x2="550" y2="80" stroke="#c0392b" stroke-width="1.5"/>
  <text x="300" y="115" text-anchor="middle" font-size="18" fill="#1a1a2e" font-weight="bold">入院记录</text>
  <line x1="50" y1="130" x2="550" y2="130" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="60" y="155" font-size="12" fill="#888">科 室：乳腺外科</text>
  <text x="300" y="155" font-size="12" fill="#888">日 期：2022年7月11日</text>
  <line x1="50" y1="170" x2="550" y2="170" stroke="#e0d5b8" stroke-width="0.5"/>
  <text x="60" y="210" font-size="13" fill="#888">姓 名：</text><text x="180" y="210" font-size="14" fill="#333">欧阳*健</text>
<text x="60" y="236" font-size="13" fill="#888">性 别：</text><text x="180" y="236" font-size="14" fill="#333">女</text><text x="340" y="236" font-size="13" fill="#888">年 龄：</text><text x="440" y="236" font-size="14" fill="#333">47岁</text>
<text x="60" y="262" font-size="13" fill="#888">入院日期：</text><text x="180" y="262" font-size="14" fill="#333">2022年7月11日</text>
<text x="60" y="288" font-size="13" fill="#888">病案号：</text><text x="180" y="288" font-size="14" fill="#333">2334455</text>
<line x1="50" y1="306" x2="550" y2="306" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="326" font-size="15" fill="#1a1a2e" font-weight="bold">主 诉</text>
<text x="60" y="356" font-size="14" fill="#333">发现左乳肿物2月余</text>
<line x1="50" y1="376" x2="550" y2="376" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="396" font-size="15" fill="#1a1a2e" font-weight="bold">现病史</text>
<text x="60" y="426" font-size="14" fill="#333">患者2月前无意中发现左乳外上象限一肿物，约蚕豆大小，</text>
<text x="60" y="454" font-size="14" fill="#333">无疼痛，无乳头溢液，无皮肤凹陷，无发热。遂至我院</text>
<text x="60" y="482" font-size="14" fill="#333">门诊就诊，行乳腺超声检查提示左乳外上象限实性肿块</text>
<text x="60" y="510" font-size="14" fill="#333">（BI-RADS 5类），为进一步诊治收治入院。</text>
<line x1="50" y1="530" x2="550" y2="530" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="550" font-size="15" fill="#1a1a2e" font-weight="bold">既往史</text>
<text x="60" y="580" font-size="14" fill="#333">既往体健，否认高血压、糖尿病、心脏病史。</text>
<text x="60" y="608" font-size="14" fill="#333">否认肝炎、结核等传染病史。否认外伤手术史。</text>
<line x1="50" y1="628" x2="550" y2="628" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="648" font-size="15" fill="#1a1a2e" font-weight="bold">家族史</text>
<text x="60" y="678" font-size="14" fill="#333">母亲有乳腺癌病史，已故。余家族成员体健。</text>
<line x1="50" y1="698" x2="550" y2="698" stroke="#ccc" stroke-width="0.5"/>
<text x="60" y="718" font-size="15" fill="#1a1a2e" font-weight="bold">体格检查</text>
<text x="60" y="748" font-size="14" fill="#333">T: 36.5℃  P: 78次/分  R: 18次/分  BP: 125/80mmHg</text>
<text x="60" y="776" font-size="14" fill="#333">左乳外上象限可触及一肿块，约2.5×2.0cm，质硬，</text>
<text x="60" y="804" font-size="14" fill="#333">边界不清，活动度差，与皮肤无粘连。左腋下可触及</text>
<text x="60" y="832" font-size="14" fill="#333">肿大淋巴结。右乳未触及异常。</text>

  <line x1="50" y1="880" x2="550" y2="880" stroke="#e0d5b8" stroke-width="0.5"/>
